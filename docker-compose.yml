services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: kisanuser
      POSTGRES_PASSWORD: kisanpass
      POSTGRES_DB: khetiq_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  postgres_data: