name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify app loads
        env:
          DATABASE_URL: "postgresql+asyncpg://dummy:dummy@localhost:5432/dummy"
          GEMINI_API_KEY: "dummy"
          GOOGLE_MAPS_API_KEY: "dummy"
          SECRET_KEY: "dummy"
        run: python -c "import sys; sys.path.insert(0, '.'); from app.main import app; print('App loaded successfully')"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/khetiq
            git fetch origin main
            git reset --hard origin/main
            docker-compose down
            docker-compose build --no-cache frontend
            docker-compose up --detach
            docker ps
